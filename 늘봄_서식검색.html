<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>늘봄지원실 서식 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f0f9f4;
    min-height: 100vh;
    color: #333;
  }

  /* 헤더 */
  header {
    background: linear-gradient(135deg, #b39ddb, #ce93d8);
    padding: 28px 20px 22px;
    text-align: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  }
  header h1 {
    font-family: 'Jua', sans-serif;
    font-size: 26px;
    color: white;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  header p {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
  }

  .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

  /* 키워드 검색 */
  .search-box {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(58,175,122,0.1);
    margin-bottom: 16px;
  }
  .search-box label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: #3aaf7a;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .search-row {
    display: flex;
    gap: 8px;
  }
  .search-row input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #d4f0e4;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-row input:focus { border-color: #3aaf7a; }

  /* 필터 버튼 */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }
  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1.5px solid #d4f0e4;
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: #3aaf7a;
    border-color: #3aaf7a;
    color: white;
  }

  /* 결과 수 */
  .result-count {
    font-size: 13px;
    color: #888;
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .result-count span { color: #3aaf7a; font-weight: 700; }

  /* 카드 목록 */
  .form-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }

  .form-card {
    background: white;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s, transform 0.2s;
    cursor: default;
  }
  .form-card:hover {
    box-shadow: 0 4px 16px rgba(58,175,122,0.15);
    transform: translateY(-1px);
  }

  .badge {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0px;
  }
  .badge.공문 { background: #e8f4fd; color: #5bc4e8; }
  .badge.서식 { background: #e8f9f0; color: #3aaf7a; }
  .badge.참고자료 { background: #fef9e7; color: #f0a500; }

  .form-info { flex: 1; min-width: 0; }
  .form-name {
    font-size: 14px;
    font-weight: 500;
    color: #222;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .form-meta {
    font-size: 12px;
    color: #aaa;
    margin-top: 2px;
  }
  .form-id {
    flex-shrink: 0;
    font-size: 11px;
    color: #ccc;
    font-weight: 500;
  }

  .no-result {
    text-align: center;
    padding: 40px;
    color: #bbb;
    font-size: 14px;
    display: none;
  }

  /* AI 질문창 */
  .ai-box {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(91,196,232,0.12);
    border-top: 3px solid #5bc4e8;
  }
  .ai-box label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: #5bc4e8;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .ai-box .hint {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 10px;
  }
  .ai-row {
    display: flex;
    gap: 8px;
  }
  .ai-row input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #d4effa;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .ai-row input:focus { border-color: #5bc4e8; }
  .ai-row button {
    padding: 12px 20px;
    background: #5bc4e8;
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Jua', sans-serif;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .ai-row button:hover { background: #3aafd4; }
  .ai-row button:disabled { background: #b0dff0; cursor: not-allowed; }

  .ai-answer {
    margin-top: 16px;
    padding: 16px;
    background: #f0f9ff;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    color: #333;
    display: none;
    white-space: pre-wrap;
  }
  .ai-answer.loading {
    display: block;
    color: #aaa;
    font-style: italic;
  }
  .ai-answer.visible { display: block; }

  .highlight { background: #fff3a3; border-radius: 3px; padding: 0 2px; }
</style>
</head>
<body>

<header>
  <h1>늘봄지원실 서식 검색</h1>
  <p>충남 늘봄지원실 운영자 실무 도움자료 서식 모음 · 191개 서식</p>
</header>

<div class="container">

  <!-- 키워드 즉시 검색 -->
  <div class="search-box">
    <label>🔍 키워드 검색 (즉시 필터)</label>
    <div class="search-row">
      <input type="text" id="keyword" placeholder="예: 출석부, 강사 계약서, 귀가일지..." oninput="filterForms()"/>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('전체')">전체</button>
      <button class="filter-btn" onclick="setFilter('공문')">공문</button>
      <button class="filter-btn" onclick="setFilter('서식')">서식</button>
      <button class="filter-btn" onclick="setFilter('참고자료')">참고자료</button>
      <button class="filter-btn" onclick="setFilter('1월')">1월</button>
      <button class="filter-btn" onclick="setFilter('2월')">2월</button>
      <button class="filter-btn" onclick="setFilter('3월')">3월</button>
      <button class="filter-btn" onclick="setFilter('5월')">5월</button>
      <button class="filter-btn" onclick="setFilter('6월')">6월</button>
      <button class="filter-btn" onclick="setFilter('7월')">7월</button>
      <button class="filter-btn" onclick="setFilter('10월')">10월</button>
      <button class="filter-btn" onclick="setFilter('11월')">11월</button>
      <button class="filter-btn" onclick="setFilter('12월')">12월</button>
    </div>
  </div>

  <div class="result-count" id="resultCount"><span id="countNum">191</span>개의 서식</div>

  <div class="form-list" id="formList"></div>
  <div class="no-result" id="noResult">검색 결과가 없습니다 😥</div>

  <!-- AI 질문창 -->
  <div class="ai-box">
    <label>🤖 AI에게 자세히 물어보기</label>
    <p class="hint">예: "강사 계약할 때 필요한 서식이 뭐야?", "출석부는 언제 어떻게 제출해?"</p>
    <div class="ai-row">
      <input type="text" id="aiQuestion" placeholder="궁금한 점을 자유롭게 입력하세요..." onkeydown="if(event.key==='Enter') askAI()"/>
      <button id="aiBtn" onclick="askAI()">질문하기</button>
    </div>
    <div class="ai-answer" id="aiAnswer"></div>
  </div>

</div>

<script>

let activeFilter = '전체';

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === f);
  });
  filterForms();
}

function filterForms() {
  const kw = document.getElementById('keyword').value.trim().toLowerCase();
  const list = document.getElementById('formList');
  const noResult = document.getElementById('noResult');

  const filtered = FORMS.filter(f => {
    const matchFilter = activeFilter === '전체' || f.type === activeFilter || f.month === activeFilter;
    const matchKw = !kw || f.name.toLowerCase().includes(kw) || f.id.includes(kw) || f.month.includes(kw);
    return matchFilter && matchKw;
  });

  document.getElementById('countNum').textContent = filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }
  noResult.style.display = 'none';

  list.innerHTML = filtered.map(f => {
    let name = f.name;
    if (kw) {
      const re = new RegExp(`(${kw})`, 'gi');
      name = name.replace(re, '<mark class="highlight">$1</mark>');
    }
    return `
      <div class="form-card">
        <div class="badge ${f.type}">${f.type}</div>
        <div class="form-info">
          <div class="form-name">${name}</div>
          <div class="form-meta">${f.month} 업무</div>
        </div>
        <div class="form-id">[${f.id}]</div>
      </div>`;
  }).join('');
}

async function askAI() {
  const q = document.getElementById('aiQuestion').value.trim();
  if (!q) return;

  const answerEl = document.getElementById('aiAnswer');
  const btn = document.getElementById('aiBtn');

  answerEl.className = 'ai-answer loading';
  answerEl.textContent = '잠시만요, AI가 답변을 준비 중입니다...';
  btn.disabled = true;

  const systemPrompt = `당신은 충남 늘봄지원실 운영자를 돕는 행정 도우미입니다.
다음은 서식 목록입니다 (서식번호, 월, 유형, 서식명):
${FORMS.map(f => `[${f.id}] ${f.month} ${f.type}: ${f.name}`).join('\n')}

사용자의 질문에 위 서식 목록을 바탕으로 친절하고 실용적으로 답변하세요.
관련 서식이 있으면 서식번호와 서식명을 함께 안내해 주세요.
한국어로 답변하고, 2~5문장으로 간결하게 작성하세요.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c => c.text || '').join('') || '답변을 가져오지 못했습니다.';
    answerEl.className = 'ai-answer visible';
    answerEl.textContent = text;
  } catch(e) {
    answerEl.className = 'ai-answer visible';
    answerEl.textContent = '오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
  }
  btn.disabled = false;
}

// 초기 렌더링
filterForms();
