<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>늘봄지원실 FAQ 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f4f0fb; min-height: 100vh; color: #333; }

  header {
    background: linear-gradient(135deg, #7c6fcd, #a78bda);
    padding: 28px 20px 22px;
    text-align: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  }
  header h1 { font-family: 'Jua', sans-serif; font-size: 26px; color: white; letter-spacing: 2px; margin-bottom: 4px; }
  header p { font-size: 13px; color: rgba(255,255,255,0.85); }

  /* 서식 검색 링크 버튼 */
  .nav-link {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 16px;
    background: rgba(255,255,255,0.2);
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    color: white;
    font-size: 12px;
    text-decoration: none;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .nav-link:hover { background: rgba(255,255,255,0.35); }

  .container { max-width: 800px; margin: 0 auto; padding: 24px 16px 120px; }

  .search-box { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(124,111,205,0.1); margin-bottom: 16px; }
  .search-box label { display: block; font-size: 13px; font-weight: 700; color: #7c6fcd; margin-bottom: 8px; }
  .search-row input {
    width: 100%; padding: 12px 16px;
    border: 2px solid #e0d9f7; border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }
  .search-row input:focus { border-color: #7c6fcd; }

  .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px;
    border: 1.5px solid #e0d9f7; background: white;
    font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: #666;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover { background: #7c6fcd; border-color: #7c6fcd; color: white; }

  .result-count { font-size: 13px; color: #888; margin-bottom: 10px; padding-left: 4px; }
  .result-count span { color: #7c6fcd; font-weight: 700; }

  .faq-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }

  .faq-card {
    background: white; border-radius: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    overflow: hidden; transition: box-shadow 0.2s;
  }
  .faq-card:hover { box-shadow: 0 4px 16px rgba(124,111,205,0.15); }

  .faq-question {
    padding: 14px 16px; display: flex; align-items: flex-start;
    gap: 10px; cursor: pointer; user-select: none;
  }
  .faq-q-badge {
    flex-shrink: 0; width: 26px; height: 26px;
    border-radius: 8px; background: #ede9f9;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #7c6fcd;
    margin-top: 1px;
  }
  .faq-q-text { flex: 1; font-size: 14px; font-weight: 600; color: #222; line-height: 1.5; }
  .faq-meta { font-size: 11px; color: #bbb; margin-top: 3px; }
  .faq-toggle { flex-shrink: 0; color: #bbb; font-size: 16px; transition: transform 0.2s; margin-top: 2px; }
  .faq-card.open .faq-toggle { transform: rotate(180deg); }

  .faq-answer {
    display: none; padding: 0 16px 14px 52px;
    font-size: 13.5px; color: #444; line-height: 1.8;
    border-top: 1px solid #f3f0fb;
    padding-top: 12px;
  }
  .faq-card.open .faq-answer { display: block; }

  .no-result { text-align: center; padding: 40px; color: #bbb; font-size: 14px; display: none; }
  .highlight { background: #f0e6ff; border-radius: 3px; padding: 0 2px; }

  /* AI 질문창 - 하단 고정 */
  .ai-box-fixed {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 3px solid #7c6fcd;
    padding: 14px 16px;
    box-shadow: 0 -4px 20px rgba(124,111,205,0.12);
    z-index: 100;
  }
  .ai-box-inner { max-width: 800px; margin: 0 auto; }
  .ai-box-fixed label { display: block; font-size: 12px; font-weight: 700; color: #7c6fcd; margin-bottom: 6px; }
  .ai-row { display: flex; gap: 8px; }
  .ai-row input {
    flex: 1; padding: 10px 14px;
    border: 2px solid #e0d9f7; border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .ai-row input:focus { border-color: #7c6fcd; }
  .ai-row button {
    padding: 10px 18px; background: #7c6fcd; border: none;
    border-radius: 10px; color: white;
    font-family: 'Jua', sans-serif; font-size: 14px;
    cursor: pointer; white-space: nowrap; transition: background 0.2s;
  }
  .ai-row button:hover { background: #6a5bbf; }
  .ai-row button:disabled { background: #c5bcec; cursor: not-allowed; }

  .ai-answer-popup {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    width: calc(100% - 32px); max-width: 768px;
    background: white; border-radius: 14px;
    box-shadow: 0 8px 30px rgba(124,111,205,0.2);
    padding: 16px; font-size: 14px; line-height: 1.8; color: #333;
    display: none; z-index: 99;
    max-height: 300px; overflow-y: auto;
    white-space: pre-wrap;
  }
  .ai-answer-popup.visible { display: block; }
  .ai-answer-popup .close-btn {
    float: right; background: none; border: none;
    font-size: 16px; color: #aaa; cursor: pointer; margin-left: 8px;
  }
  .ai-hint { font-size: 11px; color: #aaa; margin-bottom: 6px; }
</style>
</head>
<body>

<header>
  <h1>늘봄지원실 FAQ</h1>
  <p>충남 늘봄지원실 운영자 실무 도움자료 · 길라잡이 FAQ 모음</p>
  <a class="nav-link" onclick="alert('서식 검색 페이지를 같은 폴더에 함께 두시면 연결됩니다.')">📋 서식 검색으로 가기</a>
</header>

<div class="container">
  <div class="search-box">
    <label>🔍 키워드 검색 (질문 · 답변 동시 검색)</label>
    <div class="search-row">
      <input type="text" id="keyword" placeholder="예: 강사 계약, 자유수강권, 사후심의, 안전사고..." oninput="filterFAQ()"/>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('전체')">전체</button>
      <button class="filter-btn" onclick="setFilter('운영계획')">운영계획</button>
      <button class="filter-btn" onclick="setFilter('강사계약')">강사계약</button>
      <button class="filter-btn" onclick="setFilter('자유수강권')">자유수강권</button>
      <button class="filter-btn" onclick="setFilter('돌봄')">돌봄</button>
      <button class="filter-btn" onclick="setFilter('안전')">안전</button>
      <button class="filter-btn" onclick="setFilter('특수교육')">특수교육</button>
      <button class="filter-btn" onclick="setFilter('정보공개')">정보공개</button>
      <button class="filter-btn" onclick="setFilter('회계')">회계</button>
      <button class="filter-btn" onclick="setFilter('늘봄지원실')">늘봄지원실</button>
      <button class="filter-btn" onclick="setFilter('저작권')">저작권</button>
    </div>
  </div>

  <div class="result-count"><span id="countNum">0</span>개의 FAQ</div>
  <div class="faq-list" id="faqList"></div>
  <div class="no-result" id="noResult">검색 결과가 없습니다 😥</div>
</div>

<!-- AI 고정 질문창 -->
<div class="ai-box-fixed">
  <div class="ai-box-inner">
    <label>🤖 AI에게 자세히 물어보기</label>
    <p class="ai-hint">예: "강사 계약 해지 절차가 어떻게 돼?" / "자유수강권 3순위 탈락 시 이의신청 가능해?"</p>
    <div class="ai-row">
      <input type="text" id="aiQuestion" placeholder="궁금한 점을 자유롭게 입력하세요..." onkeydown="if(event.key==='Enter') askAI()"/>
      <button id="aiBtn" onclick="askAI()">질문하기</button>
    </div>
  </div>
</div>

<div class="ai-answer-popup" id="aiAnswerPopup">
  <button class="close-btn" onclick="document.getElementById('aiAnswerPopup').className='ai-answer-popup'">✕</button>
  <span id="aiAnswerText"></span>
</div>

<script>
const FAQS = [
  // ===== 실무도움자료 =====
  {id:"S-01-01",source:"실무도움자료",month:"1월",category:"돌봄",
   q:"맞춤형·선택형 돌봄프로그램 참여 순위는 어떻게 되나요?",
   a:"맞춤형 프로그램은 저소득층·한부모·다문화·맞벌이·특수교육대상학생 등 우선 대상자를 먼저 선정하고, 이후 일반 학생을 대상으로 추첨 방식으로 선발합니다. 선택형 돌봄프로그램도 동일하게 우선순위 기준을 따릅니다."},
  {id:"S-01-02",source:"실무도움자료",month:"1월",category:"강사계약",
   q:"개인위탁 외부강사 모집 공고에 탈락한 응모자의 서류도 보관해야 하나요?",
   a:"탈락한 응모자가 응모서류의 반환을 청구하는 경우 채용절차의 공정화에 관한 법률에 따라 본인임을 확인한 후 반환할 수 있습니다. 반환 청구기간(14일~180일 범위 내 학교에서 지정)이 지난 경우에는 개인정보보호법에 따라 채용서류를 파기해야 합니다."},
  {id:"S-01-04",source:"실무도움자료",month:"1월",category:"강사계약",
   q:"늘봄학교 프로그램 강사도 결핵검진과 잠복결핵감염검진을 실시해야 하나요?",
   a:"결핵예방법 제11조에 해당하는 초·중등교육법 제2조에 따른 학교의 장은 종사자·교직원에게 결핵검진 및 잠복결핵감염검진을 실시해야 합니다. 다만 사회복무요원, 자원봉사자, 개인이 고용한 간병인 등 기관·학교와 고용관계가 없는 경우는 제외될 수 있으나, 감염 위험성이 있다고 판단되는 경우 검진을 권장합니다."},
  {id:"S-01-05",source:"실무도움자료",month:"1월",category:"강사계약",
   q:"결핵검진의 주기 및 실시 방법은 어떻게 되나요?",
   a:"결핵예방법 시행규칙 제4조에 따라 결핵검진(X-ray)은 매년 실시하고, 잠복결핵감염검진은 계약일로부터 1개월 이내에 실시합니다(늘봄 프로그램 강사로 활동한 기간 중 1회만 실시)."},
  {id:"S-01-06",source:"실무도움자료",month:"1월",category:"강사계약",
   q:"늘봄학교 프로그램 위탁강사 계약 시 아동학대관련범죄 전력도 조회해야 하나요?",
   a:"아동복지법 제29조의3에 따라 아동관련기관의 장은 취업 중이거나 사실상 노무를 제공 중인 사람 또는 취업하려는 사람에 대하여 아동학대관련범죄 전력을 의무적으로 확인해야 합니다."},
  {id:"S-01-07",source:"실무도움자료",month:"1월",category:"강사계약",
   q:"업체소속 강사에 대해서도 학교에서 성범죄 경력 및 아동학대관련범죄 전력 조회를 실시해야 하나요?",
   a:"늘봄학교 프로그램을 업체에 위탁운영할 경우에도 학교에서는 참여하는 업체 소속 강사에 대해 성범죄 경력 및 아동학대관련범죄 전력을 확인해야 합니다."},
  {id:"S-01-08",source:"실무도움자료",month:"1월",category:"강사계약",
   q:"개인위탁 강사 채용 시 제안서 평가위원과 프로그램 운영능력 평가위원 구성 시 내부위원과 외부위원의 기준인원이 몇 명인가요?",
   a:"평가위원회 구성은 내부위원과 외부위원으로 구성되며, 구성비율과 평가위원 수는 학교 여건에 따라 학교장이 자율 결정합니다."},
  {id:"S-01-09",source:"실무도움자료",month:"1월",category:"강사계약",
   q:"협상에 의한 계약과 2단계 입찰 시 제안서 평가위원회 구성 기준이 있나요?",
   a:"협상에 의한 계약 및 2단계 입찰의 경우 지방계약법 시행령 및 관련 지침에 따라 평가위원회를 구성합니다. 위원은 내부·외부위원을 포함하며 이해관계자는 제외해야 하고, 회의록 작성이 필수입니다. 세부 기준은 충청남도교육청 학교업무자료실 계약 관련 자료를 참조하시기 바랍니다."},
  {id:"S-02-01",source:"실무도움자료",month:"2월",category:"운영계획",
   q:"학교운영위원회 심의를 최초 연간 운영 계획서만 받고 운영 도중 변경된 사항에 대해 사후 심의를 받아도 문제가 없나요?",
   a:"사후 심의는 원칙적으로 불가합니다. 부득이한 상황으로 사전 심의를 받지 못한 경우 내부 결재를 득하여 운영한 뒤 반드시 사후 심의를 받아야 합니다. 연간 운영 계획서에 명시되지 않은 사항이나 당초와 변경되는 사항(강좌 무료→수익자 부담, 급·간식 미운영→운영, 자체운영→업체위탁 등)은 재심의 대상입니다. 강사나 강좌의 일정 변경과 같은 세부 사항은 심의 대상이 아닙니다."},
  {id:"S-02-02",source:"실무도움자료",month:"2월",category:"강사계약",
   q:"늘봄 프로그램 운영에 따른 외부강사 계약 관련 기록물 보존 기간은 어떻게 되나요?",
   a:"공공기록물 관리에 관한 법률 시행령 제25조, 제26조에 따라 늘봄 프로그램 개인위탁 외부강사 대장(계약 관련 서류 포함)은 준영구 보관하며, 그 외 늘봄학교 관련 기록물은 5년 동안 보관합니다."},
  {id:"S-02-03",source:"실무도움자료",month:"2월",category:"운영계획",
   q:"맞춤형 유형1, 선택형 교육프로그램에서 한 학생이 수강할 수 있는 프로그램 수를 제한할 수 있나요?",
   a:"늘봄학교 운영 계획을 수립할 때 학생 생활지도 계획을 포함하여 작성하면 가능합니다. 이 내용은 1~2월 중 학교운영위원회에 심의를 받도록 하며, 학기 초 안내장 발송 및 동의서 수령을 통해 보호자가 충분히 인지하도록 안내합니다."},
  {id:"S-02-04",source:"실무도움자료",month:"2월",category:"정보공개",
   q:"늘봄학교 운영 관련 정보공개는 꼭 해야 하나요?",
   a:"교육관련기관의 정보공개에 관한 특례법 제5조 및 시행령에 따라 '늘봄학교 운영 계획 및 운영 지원 현황'을 학교 및 정보공시 누리집에 공개해야 합니다. 단위학교는 학교 누리집, 가정통신문 등을 통해 운영 계획, 프로그램 및 시간, 예산 등을 공개하도록 합니다."},
  {id:"S-02-05",source:"실무도움자료",month:"2월",category:"강사계약",
   q:"(개인위탁) 늘봄 프로그램 강사 계약해지 절차는?",
   a:"즉시 해지 사유(허위 서류 제출, 성범죄·아동학대 등)에 해당하면 통지 즉시 효력이 발생합니다. 절차 해지(2회 이상 무단 결강, 학생 지도 소홀 등)는 15일 전에 해지사유서를 통지해야 하며, 강사가 자진 포기 시에는 30일 전 서면 통지가 필요합니다. 상호 동의가 이루어지지 않을 경우 학교운영위원회 심의 후 학교장이 결정합니다."},
  {id:"S-02-06",source:"실무도움자료",month:"2월",category:"정보공개",
   q:"당해 학년도 늘봄학교 운영 내역 정산을 반드시 게시해야 하나요?",
   a:"늘봄학교 운영 계획 및 예산 집행 내역은 학교 누리집에 공개해야 합니다. 수익자 부담으로 운영되는 프로그램의 강사료 및 교재·재료비 지출 내역도 월별로 공개하는 것이 원칙입니다."},
  {id:"S-02-08",source:"실무도움자료",month:"2월",category:"특수교육",
   q:"특수교육대상학생에 대한 늘봄학교 운영 계획은 어떻게 수립하나요?",
   a:"특수교육대상학생의 늘봄학교 운영 계획은 일반 학생 운영 계획에 특수교육대상학생 관련 내용을 포함하여 작성합니다. 자유수강권, 배움카드, 통합돌봄 보조강사 예산 등 특수교육대상학생에 대한 지원 내용을 반영하며, 학교운영위원회 심의를 받아야 합니다."},
  {id:"S-02-09",source:"실무도움자료",month:"2월",category:"운영계획",
   q:"단위학교별 늘봄학교 생활규정이 필요한가요?",
   a:"정규 교과시간과 마찬가지로 늘봄학교에서도 학생 관리를 위한 생활규정이 필요합니다. 기존 학교 생활규정과 통합 운영하여 교육의 연속성과 일관된 생활지도를 지원할 수 있습니다."},
  {id:"S-02-10",source:"실무도움자료",month:"2월",category:"특수교육",
   q:"특수교육대상학생 방과후 배움카드 이용기관 등록 여부를 어떻게 확인하나요?",
   a:"누리집(https://cnedu.nhdream.co.kr)에서 [가맹점 조회하기] 메뉴를 클릭하여 해당 기관을 검색합니다. 검색 결과에 기관명이 조회되면 등록된 기관이고, 조회되지 않으면 미등록 기관입니다. 특정 지역 배움카드 등록기관 목록은 지역명(예: 천안)으로 검색하여 확인할 수 있습니다."},
  {id:"S-02-11",source:"실무도움자료",month:"2월",category:"특수교육",
   q:"특수교육대상학생이 있는 경우 통합돌봄 보조강사 예산 신청을 꼭 해야 하나요?",
   a:"학교 자체 예산으로 통합돌봄의 수요를 감당하기 어려운 경우 학생의 안전과 돌봄 질 확보를 위해 통합돌봄 보조강사 예산 신청을 권장합니다. 특수교육대상학생이 돌봄교실을 이용하는 경우 초등돌봄전담사 1인이 모든 학생을 돌보는 데 어려움이 따르므로, 보조강사 배치를 위한 예산 신청이 바람직합니다."},
  {id:"S-03-01",source:"실무도움자료",month:"3월",category:"운영계획",
   q:"늘봄 지원인력(자원봉사자)은 어떻게 활용해야 할까요?",
   a:"늘봄 지원인력(자원봉사자) 위촉 시 무보수임을 반드시 명시하며, 봉사활동 실비(교통비 등)는 '내부 기준에 따른 소정의 봉사 실비 지원'으로 표기합니다. 4대보험 가입이 불가하며, 봉사시간은 주당 15시간 미만으로 하고 실비는 봉사시간에 관계없이 1인당 3만 원을 정액으로 지급합니다."},
  {id:"S-03-02",source:"실무도움자료",month:"3월",category:"자유수강권",
   q:"특수교육대상학생은 배움카드와 자유수강권을 함께 사용할 수 있나요?",
   a:"특수학급에 재학 중인 특수교육대상학생이 교육부 장애학생 교육지원 사업 또는 교육청 늘봄·방과후학교 운영 사업 등에서 수혜를 받고 있을 경우 자유수강권은 지원되지 않습니다."},
  {id:"S-03-04",source:"실무도움자료",month:"3월",category:"자유수강권",
   q:"저소득층이면서 다자녀라면 연간 120만 원이 지원 가능한가요?",
   a:"자유수강권은 지원 유형(저소득층 60만 원, 다자녀 60만 원 등)에 따라 지원되지만, 중복 지원은 불가합니다. 따라서 저소득층이면서 다자녀에 해당하더라도 두 지원을 합산하여 120만 원을 받는 것은 불가하며, 해당 학생에게 유리한 한 가지 유형으로만 지원받을 수 있습니다."},
  {id:"S-04-01",source:"실무도움자료",month:"4월",category:"회계",
   q:"수강생의 중도 포기로 강사료의 부족이 생겼을 때 수용비에서 지급할 수 있나요?",
   a:"강사료 부족분을 수용비에서 충당하는 것은 불가합니다. 시간당 강사료를 일률적으로 책정했을 경우 수강생의 중도 포기로 인한 강사료 부족 현상이 발생할 수 있으며, 이러한 경우에는 단위 학교의 늘봄학교 프로그램 예산에서 보전하거나 강사료에서 감액(계약서에 명시되어 있어야 함)해야 합니다."},
  {id:"S-05-01",source:"실무도움자료",month:"5월",category:"자유수강권",
   q:"작년 자유수강권 대상자가 당해년도 지원이 취소되면, 더 이상 자유수강권을 받을 수 없나요?",
   a:"작년 자유수강권 대상자였다면, 올해 자유수강권 대상자가 나오는 5월까지 15만 원 한도 내에서 계속 지원받을 수 있습니다. 5월 이후 교육비 지원 대상자로 선정되지 않으면 지원이 종료됩니다."},
  {id:"S-05-04",source:"실무도움자료",month:"5월",category:"자유수강권",
   q:"자유수강권 3순위(학교장 추천) 탈락에 대해서도 이의신청을 제기할 수 있나요?",
   a:"자유수강권 학교장 추천은 학생복지심사위원회의 심의를 거쳐 결정되며, 탈락 시 이의신청 절차가 별도로 규정되어 있지 않습니다. 다만 심사 과정의 공정성이나 절차상 문제가 있다고 판단되는 경우 학교장에게 재심 요청을 할 수 있습니다."},
  {id:"S-07-02",source:"실무도움자료",month:"7월",category:"돌봄",
   q:"학기 중에 늘봄과정에 참여하지 않았던 학생도 방학 중에 참여가 가능한가요?",
   a:"방학 중 늘봄학교 운영 계획에 따라 학기 중 미참여 학생도 방학 중에 신청하여 참여할 수 있습니다. 단, 방학 중 운영 계획 수립 시 참여 대상 및 인원을 명확히 정하고 학교운영위원회 심의를 받아야 합니다."},
  {id:"S-08-01",source:"실무도움자료",month:"8월",category:"운영계획",
   q:"학교운영위원회 심의를 최초 연간 운영 계획서만 받고 운영 도중 변경된 사항에 대해 사후 심의를 받아도 문제가 없나요?",
   a:"연간 운영 계획서에 명시되지 않은 사항이나 당초와 변경이 되는 사항에 대해서는 다시 심의를 받아야 합니다. 사후 심의는 원칙적으로 불가하나 부득이한 상황에서 사전 심의를 받지 못하는 경우 내부결재를 득하여 운영한 뒤 반드시 사후 심의를 받아야 합니다. 강사나 강좌의 일정 변경과 같은 세부적인 사항은 심의 대상이 아닙니다."},
  {id:"S-10-01",source:"실무도움자료",month:"10월",category:"정보공개",
   q:"늘봄학교 공개는 반드시 해야 하나요?",
   a:"늘봄학교 운영 지침에서 '늘봄학교는 내실 있는 늘봄과정 운영을 위하여 연 1회 이상의 보호자 대상 늘봄학교 공개의 날을 운영하여야 한다'라고 명시하고 있습니다. 따라서 공개의 날 운영 계획을 수립하고 결과를 운영 개선 자료 또는 학생 지도 및 보호자 상담자료로 활용해야 합니다."},
  {id:"S-12-01",source:"실무도움자료",month:"12월",category:"운영계획",
   q:"늘봄학교소위원회는 반드시 설치해야 하는 것인가요?",
   a:"늘봄학교소위원회는 반드시 설치해야 하는 것은 아니며, 당해 학교규정 및 학교운영위원회에서 판단할 사항입니다. 또한 학교운영위원회 내 다른 소위원회에서 늘봄학교소위원회의 기능(위탁업체 선정 과정의 투명성 확보 등)을 수행할 수 있다면 통합 운영이 가능합니다."},
  {id:"S-12-02",source:"실무도움자료",month:"12월",category:"운영계획",
   q:"맞춤형 프로그램 중 '유형③' 프로그램은 어떻게 구성해야 할까요?",
   a:"유형③은 매일 2차시의 무상 프로그램을 수강하는 유형으로, 입학 초기 적응과 한글교육, 놀이·신체활동 중심의 다양하고 재미있는 프로그램으로 구성할 수 있습니다. 2차시 프로그램 참여 후 희망에 따라 선택형 돌봄프로그램(무상), 선택형 교육프로그램(유상)에 참여할 수 있습니다."},
  {id:"S-12-03",source:"실무도움자료",month:"12월",category:"회계",
   q:"수용비 계산은 어떻게 해야 할까요?",
   a:"수용비는 늘봄학교 프로그램 운영에 필요한 소모품, 재료비, 교재비 등 물품 구입에 사용하는 예산입니다. 수강생 수와 운영 프로그램을 기준으로 예산을 편성하며, 강사료와 별도로 계상합니다. 세부 산출 기준은 단위학교 늘봄학교 운영 계획에 포함하여 학교운영위원회 심의를 받도록 합니다."},
  {id:"S-12-04",source:"실무도움자료",month:"12월",category:"돌봄",
   q:"초등돌봄전담사의 방학 중 비근무 시 대체인력은 어떻게 선발해야 할까요?",
   a:"초등돌봄전담사의 방학 중 비근무 기간에는 대체인력을 선발해야 합니다. 대체인력은 공개 모집 또는 교육청 인력풀을 활용하여 선발하며, 성범죄 경력 및 아동학대관련범죄 전력 조회 등 채용 절차를 준수해야 합니다."},

  // ===== 길라잡이 FAQ =====
  {id:"G-1-1",source:"길라잡이",month:"",category:"운영계획",
   q:"'충남 온돌봄'이란 무엇인가요?",
   a:"충남 온돌봄은 기존의 방과후학교와 초등돌봄교실을 통합하고, 정규수업 외 시간에 초등학생의 성장과 발달을 위해 학교와 지역사회의 다양한 돌봄 자원과 교육을 연계하여 운영하는 학교교육활동입니다. 기존 '늘봄학교'를 대신하여 충남의 특색을 반영한 새로운 이름입니다."},
  {id:"G-3-1",source:"길라잡이",month:"",category:"돌봄",
   q:"온동네돌봄·교육센터는 어떤 곳인가요?",
   a:"온동네돌봄·교육센터는 학교 안팎의 시설을 활용하여 여러 초등학교의 학생들을 대상으로 교육감(교육장)이 직접 또는 위탁 운영하는 방과후·돌봄과정 시설을 말합니다."},
  {id:"G-3-2",source:"길라잡이",month:"",category:"돌봄",
   q:"온동네돌봄·교육센터는 학교 안 유휴공간만 설치 가능한가요?",
   a:"학교 안 유휴시설 및 공간을 활용하는 방법이 일반적이나 학교 밖 시설(기관 연계, 별도 설치 등)도 여건에 따라 다양하게 설치가 가능합니다."},
  {id:"G-3-3",source:"길라잡이",month:"",category:"돌봄",
   q:"온동네돌봄·교육센터와 학교 내 초등돌봄교실은 어떻게 다른가요?",
   a:"온동네돌봄·교육센터의 돌봄 프로그램과 학교 내 초등돌봄교실 프로그램은 동일합니다. 다만 초등돌봄교실은 학교 안 별도 시설에서 학교장이 직접·위탁 운영하는 것이고, 온동네돌봄·교육센터는 학교 안팎의 시설을 활용하여 여러 초등학교 학생들을 대상으로 교육감(교육장)이 직접·위탁 운영한다는 점이 다릅니다."},
  {id:"G-3-4",source:"길라잡이",month:"",category:"돌봄",
   q:"온동네돌봄·교육센터와 지역아동센터, 다함께돌봄센터, 청소년방과후아카데미 등 2개 이상의 기관을 중복해서 이용할 수 있나요?",
   a:"학생이 참여를 희망하는 경우 시간대를 달리하여 2개 이상의 기관을 이용할 수 있습니다. 각 기관은 방과후 학생의 돌봄 사각지대 해소를 위해 운영되므로 중복 이용이 가능합니다."},
  {id:"G-3-5",source:"길라잡이",month:"",category:"안전",
   q:"온동네돌봄·교육센터에서 안전사고 발생 시 학교안전공제회에 신청할 수 있나요?",
   a:"단위학교의 방과후·돌봄과정 운영 계획 수립 시 온동네돌봄·교육센터 이용과 관련한 사항을 학교운영위원회의 심의를 받아 학교장이 인정하는 교육활동에 포함시켜야 합니다. 강사 및 종사자의 안전사고에 대한 학교안전법 적용은 도 안전공제회와 미리 협의해야 하며, 필요 시 센터 자체 배상책임보험을 통해 보상이 누락되지 않도록 해야 합니다."},
  {id:"G-3-6",source:"길라잡이",month:"",category:"안전",
   q:"온동네돌봄·교육센터에서 학교폭력이 발생했을 때 어떻게 처리해야 하나요?",
   a:"온동네돌봄·교육센터 이용 중 학생 사이에서 발생한 상해, 폭행 등은 학교폭력예방 및 대책에 관한 법률에 따른 학교폭력 사안으로 신고 및 접수 절차에 따라 처리할 수 있습니다. 센터는 학교폭력 사안 처리 가이드북에 따라 단위학교 학교폭력 담당자에게 사안을 인계하고 사안 조사와 전담기구 심의에 협조해야 합니다."},
  {id:"G-4-1",source:"길라잡이",month:"",category:"운영계획",
   q:"방과후·돌봄과정 운영 시 발생하는 민원 처리는?",
   a:"방과후·돌봄과정 운영 시 발생하는 민원은 학교 내 민원대응팀을 통해 접수 후 늘봄지원실(늘봄지원실장 등 방과후·돌봄실무인력)이 담당하여 처리하며, 필요 시 교육지원청의 방과후·돌봄지원센터에서 지원받을 수 있습니다. 민원이 접수되면 늘봄지원실은 그 사실을 학교장에게 보고해야 합니다."},
  {id:"G-4-2",source:"길라잡이",month:"",category:"늘봄지원실",
   q:"방과후·돌봄과정 운영 총괄과 민원 등의 책임자는 누구인가요?",
   a:"방과후·돌봄과정 운영의 총괄 책임자는 학교장입니다. 실무적으로는 늘봄지원실장(늘봄실무사 등 방과후·돌봄실무인력)이 담당하며, 민원 처리 및 대응에 관한 사항을 학교 업무분장에 포함할 수 있습니다."},
  {id:"G-4-3",source:"길라잡이",month:"",category:"안전",
   q:"방과후·돌봄과정 운영 시간에 발생하는 안전사고는 어떻게 대응하나요?",
   a:"안전사고 발생 시 즉시 응급처치를 실시하고 학교장 및 보호자에게 통보합니다. 학교안전공제회 보상지원시스템(schoolsafe.or.kr)을 통해 사고 발생 통지 후 청구서를 작성하며, 소멸시효는 사고일로부터 3년입니다."},
  {id:"G-4-4",source:"길라잡이",month:"",category:"안전",
   q:"방과후·돌봄과정 운영 시 발생하는 안전사고도 보상받을 수 있나요?",
   a:"방과후·돌봄과정 운영 계획이 학교운영위원회의 심의를 받고 학교장이 인정하는 교육활동으로 포함된 경우 학교안전공제회를 통한 보상이 가능합니다. 학교안전법 제2조 제4항에 따라 학교장이 인정하는 교육활동에 해당해야 합니다."},
  {id:"G-4-5",source:"길라잡이",month:"",category:"안전",
   q:"방과후·돌봄과정 운영 시 발생하는 학교폭력 사안은 어떻게 대응하나요?",
   a:"방과후·돌봄과정 운영 시간에 발생하는 학교폭력 사안은 학교폭력예방 및 대책에 관한 법률에 따라 처리합니다. 늘봄지원실(늘봄지원실장 등)은 신고 접수 후 학교폭력 담당교원에게 인계하며, 학교폭력 사안 처리 가이드북에 따라 조사 및 전담기구 심의에 협조합니다."},
  {id:"G-4-6",source:"길라잡이",month:"",category:"안전",
   q:"방과후·돌봄 운영 시간에 아픈 학생 또는 응급환자가 발생했을 때 어떻게 대응하나요?",
   a:"아픈 학생 발생 시 즉시 보호자에게 연락하고 필요 시 의료기관에 이송합니다. 응급환자의 경우 119에 신고하고 응급처치를 실시하며 학교장에게 보고합니다. 응급처치 동의서 및 비상연락처를 학기 초에 미리 수집해 두어야 합니다."},
  {id:"G-5-1",source:"길라잡이",month:"",category:"늘봄지원실",
   q:"늘봄지원실장은 모든 초등학교에 배치되나요?",
   a:"늘봄지원실장은 모든 초등학교에 배치되는 것이 원칙이나, 학교 규모 및 여건에 따라 배치 방식이 다를 수 있습니다. 소규모 학교의 경우 인근 학교와 겸임하거나 교감 등이 역할을 대행할 수 있습니다."},
  {id:"G-5-2",source:"길라잡이",month:"",category:"늘봄지원실",
   q:"늘봄지원실장이 배치되지 않는 학교의 늘봄지원실장의 역할은 누가 하나요?",
   a:"늘봄지원실장이 배치되지 않는 학교에서는 교감 또는 학교장이 지정한 교원이 늘봄지원실장의 역할을 수행합니다. 필요 시 교육지원청의 방과후·돌봄지원센터에서 지원을 받을 수 있습니다."},
  {id:"G-5-3",source:"길라잡이",month:"",category:"늘봄지원실",
   q:"늘봄지원실은 교감(교무실)과 별도로 운영되는지요?",
   a:"늘봄지원실은 방과후·돌봄과정 운영을 전담하는 별도의 공간 및 조직으로 운영하는 것이 원칙입니다. 학교 여건에 따라 교무실과 같은 공간에서 운영될 수 있으나, 업무는 별도로 분리하여 운영합니다."},
  {id:"G-5-4",source:"길라잡이",month:"",category:"늘봄지원실",
   q:"늘봄지원실장이 여러 학교를 겸임하는 경우, 어떻게 업무를 처리해야 하나요?",
   a:"겸임 학교 간 업무 분장을 명확히 하고, 각 학교의 방과후·돌봄과정 운영에 차질이 없도록 합니다. 학교별 운영 계획을 별도로 수립하고, 교육지원청의 지원을 활용하여 업무를 처리합니다."},
  {id:"G-5-5",source:"길라잡이",month:"",category:"늘봄지원실",
   q:"늘봄지원실장이 수업(정규수업 보결, 방과후·돌봄 프로그램 강사)을 할 수 있나요?",
   a:"늘봄지원실장은 방과후·돌봄과정 운영 업무를 담당하는 인력으로, 정규수업 보결은 원칙적으로 해당하지 않습니다. 방과후 프로그램 강사로서의 역할은 별도의 계약을 통해 가능하나, 늘봄지원실 업무와의 겸직 여부는 관련 지침을 확인해야 합니다."},
  {id:"G-6-1",source:"길라잡이",month:"",category:"강사계약",
   q:"늘봄허브를 통해 외부강사를 채용하려면 어떻게 해야 하나요?",
   a:"늘봄허브(교육청 운영 인력풀)에 등록된 강사를 활용할 경우 별도의 모집 공고 없이 계약이 가능합니다. 늘봄허브 공개 강사는 공인된 심사과정을 통과한 자이므로 공고 과정을 생략할 수 있으나, 성범죄 경력 및 아동학대관련범죄 전력 조회는 반드시 실시해야 합니다."},
  {id:"G-6-2",source:"길라잡이",month:"",category:"강사계약",
   q:"개인위탁 외부강사 모집 시 학력 또는 연령제한을 할 수 있나요?",
   a:"강사 모집 시 학력 또는 연령제한은 합리적인 사유가 있는 경우에만 가능합니다. 차별금지법 및 관련 지침에 따라 불합리한 학력·연령 제한은 금지되며, 프로그램 운영에 필요한 자격 요건을 기준으로 모집 조건을 설정해야 합니다."},
  {id:"G-6-3",source:"길라잡이",month:"",category:"강사계약",
   q:"개인위탁 외부강사와 계약할 때 계약기간은 어떻게 해야 하나요?",
   a:"개인위탁 외부강사와의 계약기간은 1년 이내로 합니다. 강사 만족도가 80점 이상인 경우 공모 절차 없이 1년 미만으로 재계약할 수 있으며, 당초 계약기간을 포함하여 총 2년 미만으로 연장 가능합니다. 2년 이상일 경우 반드시 공모 절차를 진행해야 합니다."},
  {id:"G-6-4",source:"길라잡이",month:"",category:"강사계약",
   q:"개인위탁 강사와의 계약을 위해 성범죄 경력 및 아동학대관련범죄 전력을 조회해야 하나요? 조회 방법과 회신내용은 무엇인가요?",
   a:"의무적으로 조회해야 합니다. 조회 방법은 ①행정정보공동이용시스템(share.go.kr) 활용 또는 ②범죄경력회보서 발급시스템(crims.police.go.kr) 활용 두 가지입니다. 방법①의 경우 사전동의서와 조회동의서가 필요하며, 방법②는 별도 구비서류가 없습니다. 조회 결과는 취업제한 사유 해당 여부를 확인하는 것으로, 수업 실시 전에 내부결재가 완료되어야 합니다."},
  {id:"G-6-5",source:"길라잡이",month:"",category:"강사계약",
   q:"인근 학교에서 근무하고 있는 개인위탁 외부강사가 본교에 지원 시 계약 구비서류를 해당 학교의 사본(원본대조필)으로 대체할 수 있나요?",
   a:"먼저 계약한 학교에 제출한 서류의 사본(원본대조필)으로 대체 가능합니다. 다만 유효기간이 만료된 채용신체검사서, 개인정보 수집·이용 및 제3자 제공 동의서, 성범죄 경력 및 아동학대관련범죄 전력 조회 동의서는 제외되며 새로 제출해야 합니다."},
  {id:"G-6-7",source:"길라잡이",month:"",category:"강사계약",
   q:"학교의 비정규직 직원이 방과후 프로그램 강사가 될 수 있나요?",
   a:"비정규직 직원은 계약된 기간과 시간의 범위 내에서 근무하는 것이므로 근무 시간 내에는 강사가 될 수 없습니다. 다만 근무시간 이후에는 별도 계약을 통해 가능합니다."},
  {id:"G-6-8",source:"길라잡이",month:"",category:"강사계약",
   q:"원어민영어보조교사나 스포츠강사가 방과후 프로그램을 운영하고 수당을 받을 수 있나요?",
   a:"정해진 수업시수 안에서 정규수업과 방과후 프로그램 운영이 가능하다면 급여만 지급하고, 시수를 초과하게 되면 별도 수당을 지급해야 합니다. 충남교육청과 교육공무직 단체협약 개정에 따라 달라질 수 있으므로 최신 지침을 확인하시기 바랍니다."},
  {id:"G-6-9",source:"길라잡이",month:"",category:"강사계약",
   q:"한 프로그램을 두 명의 강사가 운영하고 주 강사와 보조강사 명목으로 수당을 지급할 수 있나요?",
   a:"방과후·돌봄 프로그램 운영은 원칙적으로 한 프로그램당 한 명의 강사가 운영해야 합니다. 보조강사비는 예산 요구 시 반영되지 않으므로, 보조강사가 꼭 필요한지 여부를 면밀히 판단해야 합니다."},
  {id:"G-6-10",source:"길라잡이",month:"",category:"강사계약",
   q:"방과후 프로그램 개인위탁 강사의 사정으로 더 이상 수업을 진행할 수 없어서 위탁강사를 교체할 경우 계약 과정과 필요한 서류는 무엇인가요?",
   a:"위탁강사를 교체할 경우에도 개인위탁 강사 모집 시 절차를 따르고 필요한 서류(프로그램 운영 제안서 및 자격증 사본 등)를 갖추어야 합니다."},
  {id:"G-6-13",source:"길라잡이",month:"",category:"강사계약",
   q:"맞춤형 순회강사의 수업 시수 종료로 학교와 방과후 프로그램 강사가 직접 계약을 하는 경우, 공고 및 성범죄와 아동학대 전력 조회를 다시 해야 할까요?",
   a:"공고 및 성범죄와 아동학대 전력 조회 모두 다시 해야 합니다. 단, 해당 강사가 늘봄허브에 공개된 강사라면 공고 과정은 생략 가능합니다. 계약 주체가 변경되는 경우이므로 당해 연도에 조회 결과가 내부결재 되어 있더라도 반드시 전력 조회를 재실시해야 합니다."},
  {id:"G-6-14",source:"길라잡이",month:"",category:"강사계약",
   q:"긴급공고란 무엇이며, 긴급공고 시 학교에서 유의해야 할 점은 무엇인가요?",
   a:"긴급공고란 일반 공고보다 준비 기간이 짧고 신속한 사업 진행이 필요한 긴급 상황 대응을 위한 공고 방식입니다. 개인위탁 강사 채용 긴급공고는 최소 3일 이상(공고등록일 제외, 공휴일 포함)이며, 긴급공고 사유를 관련 내부결재 계획에 명시해야 합니다. 긴급공고는 특수한 상황에만 사용하고 남용하지 않도록 주의합니다."},
  {id:"G-7-1",source:"길라잡이",month:"",category:"회계",
   q:"방과후 프로그램 강사료는 어떻게 지급하나요?",
   a:"강사료는 프로그램 운영을 종료(보강 완료 후) 한 날로부터 19일 이내에 원천징수 금액을 제외한 금액을 강사의 은행계좌로 지급합니다(용역완료검사 14일 + 대금지급 5일). 월별 또는 기별 지급이 가능합니다."},
  {id:"G-8-1",source:"길라잡이",month:"",category:"정보공개",
   q:"방과후·돌봄과정 운영 평가는 어떻게 해야 하나요?",

let activeFilter = '전체';

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === f));
  filterFAQ();
}

function filterFAQ() {
  const kw = document.getElementById('keyword').value.trim().toLowerCase();
  const list = document.getElementById('faqList');
  const noResult = document.getElementById('noResult');

  const filtered = FAQS.filter(f => {
    const matchFilter = activeFilter === '전체' || f.category === activeFilter;
    const matchKw = !kw ||
      f.q.toLowerCase().includes(kw) ||
      f.a.toLowerCase().includes(kw) ||
      f.source.includes(kw) ||
      f.category.includes(kw);
    return matchFilter && matchKw;
  });

  document.getElementById('countNum').textContent = filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }
  noResult.style.display = 'none';

  list.innerHTML = filtered.map((f, idx) => {
    let qText = f.q;
    let aText = f.a;
    if (kw) {
      const re = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      qText = qText.replace(re, '<mark class="highlight">$1</mark>');
      aText = aText.replace(re, '<mark class="highlight">$1</mark>');
    }
    const metaStr = [f.source, f.month ? f.month + ' 업무' : '', f.category].filter(Boolean).join(' · ');
    return `
      <div class="faq-card" id="card-${idx}">
        <div class="faq-question" onclick="toggleCard(${idx})">
          <div class="faq-q-badge">Q</div>
          <div class="faq-q-text">
            ${qText}
            <div class="faq-meta">${metaStr}</div>
          </div>
          <div class="faq-toggle">▼</div>
        </div>
        <div class="faq-answer">${aText}</div>
      </div>`;
  }).join('');
}

function toggleCard(idx) {
  const card = document.getElementById('card-' + idx);
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.faq-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
}

async function askAI() {
  const q = document.getElementById('aiQuestion').value.trim();
  if (!q) return;

  const popup = document.getElementById('aiAnswerPopup');
  const answerText = document.getElementById('aiAnswerText');
  const btn = document.getElementById('aiBtn');

  popup.className = 'ai-answer-popup visible';
  answerText.textContent = '잠시만요, AI가 답변을 준비 중입니다...';
  btn.disabled = true;

  const systemPrompt = `당신은 충남 늘봄지원실 운영자를 돕는 행정 도우미입니다.
다음은 FAQ 데이터입니다:
${FAQS.map(f => `[${f.id}] (${f.category}) Q: ${f.q}\nA: ${f.a}`).join('\n\n')}

사용자의 질문에 위 FAQ를 바탕으로 친절하고 실용적으로 답변하세요.
관련 FAQ가 있으면 해당 내용을 인용하여 답변하세요.
한국어로 답변하고, 3~6문장으로 간결하게 작성하세요.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c => c.text || '').join('') || '답변을 가져오지 못했습니다.';
    answerText.textContent = text;
  } catch(e) {
    answerText.textContent = '오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
  }
  btn.disabled = false;
}

filterFAQ();
