<!DOCTYPE HTML>
<html>
<head>
  <title>성환초 / 목천초 늘봄지원실</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif; background: #f2f4f8; padding: 12px; }

    .header {
      background: #2d5a8e;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-left { flex: 1; }
    .header-left .year { font-size: 13px; color: #a8c8f0; margin-bottom: 4px; }
    .header-left .school { font-size: 18px; color: #ffffff; margin-bottom: 4px; }
    .header-left .title { font-size: 34px; font-weight: bold; color: #ffffff; }
    .header-photos { display: flex; gap: 6px; flex-shrink: 0; }
    .header-photo {
      width: 72px;
      height: 80px;
      background: #4a7aae;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #a8c8f0;
      overflow: hidden;
    }
    .header-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

    .section {
      background: #e8f0f8;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .section-label {
      font-size: 12px;
      color: #2d5a8e;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .icon-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }
    .icon-item {
      background: #ffffff;
      border-radius: 10px;
      padding: 10px 4px;
      text-align: center;
      border: 0.5px solid #c8d8e8;
      text-decoration: none;
      display: block;
    }
    .icon-item.school-icon {
      background: #d0e4f4;
      border: 1px solid #9abcd8;
    }
    .icon-img {
      width: 42px;
      height: 42px;
      margin: 0 auto 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .icon-img img { width: 100%; height: 100%; object-fit: contain; }
    .icon-label {
      font-size: 10px;
      color: #4a6a8a;
      line-height: 1.3;
    }
    .school-icon .icon-label { color: #1d4a7a; font-weight: bold; }

    .links-section {
      background: #ede8f8;
      border-radius: 14px;
      padding: 14px;
    }
    .links-label {
      font-size: 12px;
      color: #5a3a8a;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .links-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .link-item {
      background: #ffffff;
      border-radius: 8px;
      padding: 10px 4px;
      text-align: center;
      border: 0.5px solid #c0b0e0;
      text-decoration: none;
      display: block;
    }
    .link-label {
      font-size: 10px;
      color: #5a3a8a;
      line-height: 1.4;
    }
    .link-img {
      width: 36px;
      height: 36px;
      margin: 0 auto 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .link-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-left">
      <div class="year">2026학년도</div>
      <div class="school">성환초 / 목천초</div>
      <div class="title">늘봄지원실</div>
    </div>
    <div class="header-photos">
      <div class="header-photo"><img src="images/header01.jpg" alt="" /></div>
      <div class="header-photo"><img src="images/header02.jpg" alt="" /></div>
      <div class="header-photo"><img src="images/header03.jpg" alt="" /></div>
    </div>
  </div>

      <a href="#" class="icon-item">
        <div class="icon-img"><img src="images/monthly-subscription-icon.svg" alt="" /></div>

      <a href="https://docs.google.com/spreadsheets/d/1WrLHOUkNpce0fwC4qRYcbynhhw_oP3png-ojMmhp03o/edit?usp=sharing" class="icon-item" target="_blank">
        <div class="icon-img"><img src="images/file-black-icon.svg" alt="" /></div>

  </div>

</body>
