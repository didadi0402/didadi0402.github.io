<!DOCTYPE HTML>
<html>
<head>
  <title>성환초 / 목천초 늘봄지원실</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Gamja+Flower&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
      background: #f5f0e8;
      padding: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    .header {
      border-radius: 18px;
      padding: 0;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      box-shadow: 0 6px 24px rgba(30,50,70,0.28);
      position: relative;
      overflow: visible;
      height: 40vh;
      flex-shrink: 0;
      background: #3a4f60;
      clip-path: inset(0 round 18px);
    }
    /* 배경 질감 */
    .header-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(80,110,140,0.45) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(50,80,100,0.3) 0%, transparent 50%);
      border-radius: 18px;
    }
    /* 장식 곡선 — 오른쪽 사진 근처 */
    .header-deco {
      position: absolute;
      right: 2%;
      top: 0; bottom: 0;
      width: 110px;
      z-index: 1;
      pointer-events: none;
    }
    .header-deco svg { width: 100%; height: 100%; }

    /* shimmer */
    .header-shimmer {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(110deg, transparent 25%, rgba(255,220,200,0.15) 50%, transparent 75%);
      background-size: 200% 100%;
      background-position: -200% 0;
      pointer-events: none;
      z-index: 1;
    }
    .header-shimmer.active { animation: shimmerSlide 1.2s ease forwards; }
    @keyframes shimmerSlide {
      0%   { background-position: -200% 0; opacity: 1; }
      80%  { background-position: 200% 0;  opacity: 1; }
      100% { background-position: 200% 0;  opacity: 0; }
    }

    /* ── 사진 + 텍스트 내부 레이아웃 ── */
    .header-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 0;
    }

    /* 왼쪽 큰 사진 (5:5 정사각형) */
    .photo-left {
      flex-shrink: 0;
      width: calc(40vh - 32px);
      height: calc(40vh - 32px);
      max-width: 38%;
      max-height: 100%;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      border: 2.5px solid rgba(255,255,255,0.3);
      box-shadow: 4px 4px 14px rgba(0,0,0,0.35);
      overflow: hidden;
      transform: rotate(-2deg);
      position: relative;
      z-index: 3;
    }
    .photo-left img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* 중앙 텍스트 — 블록 중앙, 내용 왼쪽 정렬 */
    .header-left {
      flex: 1;
      position: relative;
      z-index: 2;
      padding: 0 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
    }
    .header-text-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: fit-content;
    }
    .header-left .title {
      font-family: 'Gamja Flower', cursive;
      font-size: clamp(44px, 9.5vw, 92px);
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 1px;
      line-height: 1.0;
      text-shadow: 0 3px 14px rgba(0,0,0,0.3);
      white-space: nowrap;
    }
    .header-left .school {
      font-family: 'Gamja Flower', cursive;
      font-size: clamp(26px, 5vw, 48px);
      color: rgba(255,255,255,0.9);
      margin-bottom: 0;
      font-weight: 400;
      letter-spacing: 1px;
      line-height: 1.15;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      white-space: nowrap;
      overflow: hidden;
      max-width: 100%;
    }
    .header-left .year {
      font-family: 'Gamja Flower', cursive;
      font-size: clamp(14px, 2vw, 20px);
      color: rgba(255,255,255,0.75);
      margin-bottom: 2px;
      letter-spacing: 2px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      max-width: 100%;
    }
    .header-left .year,
    .header-left .school {
      max-width: 100%;
      overflow: hidden;
    }

    /* 오른쪽 작은 사진 2장 겹치기 */
    .photos-right {
      flex-shrink: 0;
      position: relative;
      width: calc((40vh - 32px) * 0.85);
      height: calc(40vh - 32px);
      max-width: 32%;
    }
    .photo-right {
      position: absolute;
      width: 72%;
      aspect-ratio: 1 / 1;
      background: rgba(255,255,255,0.12);
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.28);
      box-shadow: 3px 3px 12px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .photo-right img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-right:nth-child(1) {
      top: 4%; right: 0;
      transform: rotate(15deg);
      z-index: 4;
    }
    .photo-right:nth-child(2) {
      bottom: 4%; left: 0;
      transform: rotate(-12deg);
      z-index: 3;
    }
    .header-photo-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.25); font-size: 10px;
    }

    /* ── 콘텐츠 래퍼 ── */
    .content-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      min-height: 0;
    }

    /* ── 섹션 공통 ── */
    .section {
      background: #fffdf8;
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 2px 10px rgba(122,92,62,0.08);
      border: 1px solid #ede5d5;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .section-label {
      font-size: 11px;
      color: #a07850;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-label::before {
      content: '';
      display: inline-block;
      width: 3px; height: 12px;
      background: #c89a60;
      border-radius: 2px;
    }

    /* ── 아이콘 그리드 ── */
    .icon-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      flex: 1;
      align-content: center;
    }
    .icon-item {
      background: #fdf8f2;
      border-radius: 12px;
      padding: 10px 3px 8px;
      text-align: center;
      border: 1px solid #e8dece;
      text-decoration: none;
      display: block;
      transition: all 0.18s ease;
    }
    .icon-item:active {
      transform: scale(0.95);
      background: #f5ece0;
    }
    .icon-item.school-icon {
      background: linear-gradient(135deg, #f0e6d4, #e8d5b8);
      border: 1px solid #d4b896;
    }
    .icon-img {
      width: 38px;
      height: 38px;
      margin: 0 auto 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .icon-img img { width: 100%; height: 100%; object-fit: contain; }
    .icon-label {
      font-size: 9.5px;
      color: #6b4e2e;
      line-height: 1.3;
      font-weight: 700;
    }
    .school-icon .icon-label { color: #5a3e22; }

    /* ── 주요링크 ── */
    .links-section {
      background: #fffdf8;
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 2px 10px rgba(122,92,62,0.08);
      border: 1px solid #ede5d5;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .links-label {
      font-size: 11px;
      color: #a07850;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .links-label::before {
      content: '';
      display: inline-block;
      width: 3px; height: 12px;
      background: #c89a60;
      border-radius: 2px;
    }
    .links-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      flex: 1;
      align-content: center;
    }
    .link-item {
      background: #fdf8f2;
      border-radius: 12px;
      padding: 12px 4px 10px;
      text-align: center;
      border: 1px solid #e8dece;
      text-decoration: none;
      display: block;
      transition: all 0.18s ease;
    }
    .link-item:active {
      transform: scale(0.95);
      background: #f5ece0;
    }
    .link-emoji {
      font-size: 22px;
      display: block;
      margin-bottom: 5px;
      line-height: 1;
    }
    .link-label {
      font-size: 9.5px;
      color: #6b4e2e;
      line-height: 1.35;
      font-weight: 700;
    }

    /* ── 팝업 ── */
    .popup-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(80,50,20,0.5);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .popup-box {
      background: #fffdf8;
      padding: 32px 36px;
      border-radius: 18px;
      text-align: center;
      border: 1px solid #e8dece;
      box-shadow: 0 8px 32px rgba(122,92,62,0.2);
    }
    .popup-email {
      font-size: 18px;
      font-weight: 700;
      color: #7a5c3e;
      margin-bottom: 8px;
    }
    .popup-desc {
      font-size: 13px;
      color: #a08060;
      margin-bottom: 20px;
    }
    .popup-close {
      padding: 10px 28px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      border: 1.5px solid #c89a60;
      border-radius: 10px;
      background: #fdf8f2;
      color: #7a5c3e;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .popup-close:active {
      background: #f0e4cc;
    }
  </style>
</head>

      <svg viewBox="0 0 110 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

        <path d="M65,0 Q0,75 60,150 Q120,225 35,300"  fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="14" stroke-linecap="round"/>
        <path d="M45,0 Q-20,75 40,150 Q100,225 15,300" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8"  stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-shimmer" id="headerShimmer"></div>

    <div class="header-inner">
      <!-- 왼쪽 큰 사진 1장 (5:5) -->
      <div class="photo-left">

      <!-- 중앙 텍스트 -->

      </div>

      <!-- 오른쪽 작은 사진 2장 (4:4, 겹치기) -->
      <div class="photos-right">
        <div class="photo-right">
          <img src="images/header02.jpg" alt=""
            onerror="this.style.display='none';this.parentNode.innerHTML+='<div class=\'header-photo-placeholder\'>사진 2</div>'"/>
        </div>
        <div class="photo-right">
          <img src="images/header03.jpg" alt=""
            onerror="this.style.display='none';this.parentNode.innerHTML+='<div class=\'header-photo-placeholder\'>사진 3</div>'"/>
        </div>
      </div>
    </div>
  </div>

  <script>
    function runShimmer() {
      const el = document.getElementById('headerShimmer');
      el.classList.remove('active');
      void el.offsetWidth;
      el.classList.add('active');
      const next = 3000 + Math.random() * 2000;
      setTimeout(runShimmer, next);
    }
    setTimeout(runShimmer, 1000);

    function alignTextToTitle() {
      const title = document.querySelector('.header-left .title');
      const block = document.querySelector('.header-text-block');
      if (!title || !block) return;
      // title 렌더링 너비를 블록 전체 width로 고정
      const w = title.getBoundingClientRect().width;
      block.style.width = w + 'px';
    }
    document.fonts.ready.then(() => {
      alignTextToTitle();
      // 폰트 로드 직후 한 프레임 더 기다려서 재측정
      requestAnimationFrame(alignTextToTitle);
    });
    window.addEventListener('resize', alignTextToTitle);
  </script>
